server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to backend
    location /api/ {
        proxy_pass https://myl-database-production.up.railway.app/api/;
        proxy_set_header Host myl-database-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Image proxy
    location /images/ {
        proxy_pass https://myl-database-production.up.railway.app/images/;
        proxy_set_header Host myl-database-production.up.railway.app;
        proxy_ssl_server_name on;
    }

    # SPA fallback - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
